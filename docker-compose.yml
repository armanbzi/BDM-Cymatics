
# Run: docker compose up -d (includes Spark master/workers/history alongside MinIO, Kafka, Airflow, SonarQube).

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Docker/airflow_Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Web UI login — values pulled from .env (AIRFLOW_USERNAME / AIRFLOW_PASSWORD)
    AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-admin}
    AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
    # forward project env vars so DAG tasks can reach MinIO / Freesound
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password}
    MINIO_SECURE: "${MINIO_SECURE:-false}"
    LANDING_ZONE_BUCKET: ${LANDING_ZONE_BUCKET:-landing-zone}
    TRUSTED_ZONE_BUCKET: ${TRUSTED_ZONE_BUCKET:-trusted-zone}
    EXPLOITATION_ZONE_BUCKET: ${EXPLOITATION_ZONE_BUCKET:-exploitation-zone}
    FREESOUND_API_KEY: ${FREESOUND_API_KEY:-}
    CYMATICS_PROJECT_ROOT: /opt/airflow/project
  volumes:
    - ./landing_zone/cold_path/dags:/opt/airflow/dags/cold_path
    - ./trusted_zone/dags:/opt/airflow/dags/trusted_zone
    - ./exploitation_zone/dags:/opt/airflow/dags/exploitation_zone
    - .:/opt/airflow/project
    - ./landing_zone:/opt/airflow/landing_zone
    - ./.env:/opt/airflow/.env:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - airflow-logs:/opt/airflow/logs
  depends_on:
    airflow-postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ---------------------------------------------------------------
  #  Zookeeper + Kafka
  # ---------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cymatics-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cymatics-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    volumes:
      - ./kafka:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------
  #  Kafka UI (http://localhost:8085)
  # ---------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cymatics-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cymatics
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------
  #  MinIO (object storage)
  # ---------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cymatics-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password}
    volumes:
      - ./minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------
  #  Apache Spark — standalone cluster (Docker/spark_Dockerfile; bitnami/spark tags removed from Docker Hub)
  #  Spark Master UI: http://localhost:8088
  #  History UI (18080): logs at s3a://$TRUSTED_ZONE_BUCKET/$SPARK_EVENT_LOG_PREFIX/
  #  Batch jobs: trusted-spark-batch | exploitation-spark-batch (PySpark → minio:9000)
  # ---------------------------------------------------------------
  spark-master:
    build:
      context: .
      dockerfile: Docker/spark_Dockerfile
    image: cymatics-spark:3.5.2
    container_name: cymatics-spark-master
    hostname: spark-master
    command: /opt/spark/sbin/start-master.sh
    environment:
      SPARK_NO_DAEMONIZE: "1"
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    ports:
      - "7077:7077"
      - "8088:8080"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  spark-worker-1:
    image: cymatics-spark:3.5.2
    container_name: cymatics-spark-worker-1
    command:
      - /opt/spark/sbin/start-worker.sh
      - --memory
      - 2G
      - --cores
      - "2"
      - spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "1"
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  spark-worker-2:
    image: cymatics-spark:3.5.2
    container_name: cymatics-spark-worker-2
    command:
      - /opt/spark/sbin/start-worker.sh
      - --memory
      - 2G
      - --cores
      - "2"
      - spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "1"
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  spark-history:
    image: cymatics-spark:3.5.2
    container_name: cymatics-spark-history
    command:
      - /bin/bash
      - -lc
      - >-
        exec /opt/spark/bin/spark-class
        -Dspark.history.fs.logDirectory=s3a://${TRUSTED_ZONE_BUCKET:-trusted-zone}/${SPARK_EVENT_LOG_PREFIX:-spark-logs}/
        -Dspark.history.ui.port=18080
        -Dspark.hadoop.fs.s3a.endpoint=http://minio:9000
        -Dspark.hadoop.fs.s3a.access.key=${MINIO_ACCESS_KEY:-admin}
        -Dspark.hadoop.fs.s3a.secret.key=${MINIO_SECRET_KEY:-password}
        -Dspark.hadoop.fs.s3a.path.style.access=true
        -Dspark.hadoop.fs.s3a.connection.ssl.enabled=${MINIO_SECURE:-false}
        -Dspark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
        -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        org.apache.spark.deploy.history.HistoryServer
    ports:
      - "18080:18080"
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy

  # One-shot PySpark metadata batch on the compose network (driver + MinIO S3A in Docker).
  # Usage: docker compose run --rm trusted-spark-batch
  trusted-spark-batch:
    image: cymatics-spark:3.5.2
    working_dir: /app
    volumes:
      - .:/app
    environment:
      CYMATICS_IN_DOCKER: "1"
      PYTHONPATH: /app:/app/trusted_zone
      MINIO_ENDPOINT: minio:9000
      SPARK_MASTER: spark://spark-master:7077
      SPARK_S3A_ENDPOINT: http://minio:9000
      TRUSTED_ZONE_BUCKET: ${TRUSTED_ZONE_BUCKET:-trusted-zone}
      LANDING_ZONE_BUCKET: ${LANDING_ZONE_BUCKET:-landing-zone}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password}
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      SPARK_EVENT_LOG_PREFIX: ${SPARK_EVENT_LOG_PREFIX:-spark-logs/}
      SPARK_EVENT_LOG_ENABLED: ${SPARK_EVENT_LOG_ENABLED:-true}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
      SPARK_SQL_SHUFFLE_PARTITIONS: ${SPARK_SQL_SHUFFLE_PARTITIONS:-8}
      SPARK_LOG_LEVEL: ${SPARK_LOG_LEVEL:-WARN}
      SPARK_APP_NAME: trusted-zone-processing
      # Compose overrides host shell / .env Jupyter settings (compose run forwards shell env).
      SPARK_DRIVER_BIND_ADDRESS: "0.0.0.0"
      SPARK_DRIVER_HOST: ""
      SPARK_ALLOW_HOST_DRIVER: "0"
    command: ["python3", "trusted_zone/spark_trusted_zone.py"]
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker-1:
        condition: service_started
      spark-worker-2:
        condition: service_started

  # One-shot PySpark spectral features: trusted-zone → exploitation-zone workset.
  # Usage: docker compose run --rm exploitation-spark-batch
  exploitation-spark-batch:
    image: cymatics-spark:3.5.2
    working_dir: /app
    volumes:
      - .:/app
    environment:
      CYMATICS_IN_DOCKER: "1"
      PYTHONPATH: /app:/app/exploitation_zone:/app/trusted_zone
      MINIO_ENDPOINT: minio:9000
      SPARK_MASTER: spark://spark-master:7077
      SPARK_S3A_ENDPOINT: http://minio:9000
      TRUSTED_ZONE_BUCKET: ${TRUSTED_ZONE_BUCKET:-trusted-zone}
      EXPLOITATION_ZONE_BUCKET: ${EXPLOITATION_ZONE_BUCKET:-exploitation-zone}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password}
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      SPARK_EVENT_LOG_PREFIX: ${SPARK_EVENT_LOG_PREFIX:-spark-logs/}
      SPARK_EVENT_LOG_ENABLED: ${SPARK_EVENT_LOG_ENABLED:-true}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
      SPARK_SQL_SHUFFLE_PARTITIONS: ${SPARK_SQL_SHUFFLE_PARTITIONS:-8}
      SPARK_LOG_LEVEL: ${SPARK_LOG_LEVEL:-WARN}
      SPARK_APP_NAME: exploitation-zone-processing
      SPARK_PENDING_WORKSET_KEY: ${SPARK_PENDING_WORKSET_KEY:-metadata/spark_pending_workset.json}
      SPARK_DRIVER_BIND_ADDRESS: "0.0.0.0"
      SPARK_DRIVER_HOST: ""
      SPARK_ALLOW_HOST_DRIVER: "0"
    command: ["python3", "exploitation_zone/spark_exploitation_zone.py"]
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker-1:
        condition: service_started
      spark-worker-2:
        condition: service_started

  # ---------------------------------------------------------------
  #  SonarQube (code quality — http://localhost:9090)
  # ---------------------------------------------------------------
  sonarqube:
    image: sonarqube:lts-community
    container_name: cymatics-sonarqube
    ports:
      - "9090:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD:-sonar}
      SONAR_FORCEAUTHENTICATION: "false"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    depends_on:
      sonar-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  sonar-postgres:
    image: postgres:16-alpine
    container_name: cymatics-sonar-postgres
    environment:
      POSTGRES_USER: ${SONAR_JDBC_USERNAME:-sonar}
      POSTGRES_PASSWORD: ${SONAR_JDBC_PASSWORD:-sonar}
      POSTGRES_DB: sonarqube
    volumes:
      - sonar-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  #  Airflow metadata database (PostgreSQL)
  # ---------------------------------------------------------------
  airflow-postgres:
    image: postgres:16-alpine
    container_name: cymatics-airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  #  Airflow — one-shot DB init
  # ---------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: cymatics-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$$AIRFLOW_USERNAME" \
          --password "$$AIRFLOW_PASSWORD" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  # ---------------------------------------------------------------
  #  Airflow webserver (UI at http://localhost:8080)
  # ---------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: cymatics-airflow-webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------
  #  Airflow scheduler
  # ---------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: cymatics-airflow-scheduler
    command: airflow scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-pgdata:
  airflow-logs:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  sonar-pgdata:
