
# Run: docker compose up -d

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Web UI login — values pulled from .env (AIRFLOW_USERNAME / AIRFLOW_PASSWORD)
    AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-admin}
    AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
    # forward project env vars so DAG tasks can reach MinIO / Freesound
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: admin
    MINIO_SECRET_KEY: password
    MINIO_SECURE: "false"
    MINIO_BUCKET: landing-zone
    FREESOUND_API_KEY: ${FREESOUND_API_KEY:-}
  volumes:
    - ./landing_zone/cold_path:/opt/airflow/dags/cold_path
    - ./landing_zone:/opt/airflow/landing_zone
    - ./.env:/opt/airflow/.env:ro
    - airflow-logs:/opt/airflow/logs
  depends_on:
    airflow-postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ---------------------------------------------------------------
  #  Zookeeper + Kafka
  # ---------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cymatics-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cymatics-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    volumes:
      - ./kafka:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------
  #  Kafka UI (http://localhost:8085)
  # ---------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cymatics-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cymatics
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------
  #  MinIO (object storage)
  # ---------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cymatics-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - ./minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------
  #  Airflow metadata database (PostgreSQL)
  # ---------------------------------------------------------------
  airflow-postgres:
    image: postgres:16-alpine
    container_name: cymatics-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  #  Airflow — one-shot DB init
  # ---------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: cymatics-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$$AIRFLOW_USERNAME" \
          --password "$$AIRFLOW_PASSWORD" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  # ---------------------------------------------------------------
  #  Airflow webserver (UI at http://localhost:8080)
  # ---------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: cymatics-airflow-webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------
  #  Airflow scheduler
  # ---------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: cymatics-airflow-scheduler
    command: airflow scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-pgdata:
  airflow-logs:
