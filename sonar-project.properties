sonar.projectKey=bdm-cymatics
sonar.projectName=BDM Cymatics
sonar.projectVersion=1.0

sonar.sources=.
sonar.sourceEncoding=UTF-8
sonar.language=py
sonar.python.version=3.11

sonar.inclusions=**/*.py
sonar.exclusions=\
  **/__pycache__/**,\
  **/.ipynb_checkpoints/**,\
  **/node_modules/**,\
  **/venv/**,\
  **/.venv/**,\
  data/**,\
  minio/**,\
  kafka/**

sonar.host.url=http://localhost:9090
